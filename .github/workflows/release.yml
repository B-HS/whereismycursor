name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/pages.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      # Third-party / official actions pinned to commit SHAs to satisfy the
      # repository's "Require actions to be pinned to a full-length commit
      # SHA" policy and defend against tag re-pointing.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
            MINOR=$(echo "$LATEST" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
            PATCH=$(echo "$LATEST" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\3/')
            case "$BUMP" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              *) PATCH=$((PATCH+1)) ;;
            esac
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "short=${NEXT#v}" >> "$GITHUB_OUTPUT"

      - name: Cache SPM
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run tests
        run: swift test

      # Import Developer ID cert into a temporary keychain so codesign can
      # find it. No-op if MACOS_CERTIFICATE secret is empty — the build
      # then falls back to ad-hoc (still usable, just not notarization-ready).
      - name: Import signing certificate
        id: sign
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-tmp-keychain
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No MACOS_CERTIFICATE secret set; skipping (build will be ad-hoc)."
            echo "identity=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          chmod 600 "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          rm -P "$CERT_PATH" 2>/dev/null || rm -f "$CERT_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep -o '"Developer ID Application: [^"]*"' | head -n1 | tr -d '"')
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        env:
          CODESIGN_IDENTITY: ${{ steps.sign.outputs.identity }}
        run: |
          ./build-app.sh release

      - name: Stamp version into Info.plist
        run: |
          APP=".build/Where is my cursor.app"
          plutil -replace CFBundleShortVersionString -string "${{ steps.version.outputs.short }}" "$APP/Contents/Info.plist"
          plutil -replace CFBundleVersion -string "${{ github.run_number }}" "$APP/Contents/Info.plist"
          IDENTITY="${{ steps.sign.outputs.identity }}"
          IDENTITY="${IDENTITY:--}"
          SIGN_ARGS=(--force --deep --sign "$IDENTITY")
          if [ "$IDENTITY" != "-" ]; then
            SIGN_ARGS=(--force --deep --options runtime --timestamp --sign "$IDENTITY")
            if [ -f "Resources/CursorSpotlight.entitlements" ]; then
              SIGN_ARGS+=(--entitlements "Resources/CursorSpotlight.entitlements")
            fi
          fi
          codesign "${SIGN_ARGS[@]}" "$APP"

      # Notarization — no-op when Apple credentials aren't configured.
      # Credentials are stashed in a temporary keychain profile so the
      # app-specific password never appears on the notarytool command line.
      - name: Notarize
        env:
          IDENTITY: ${{ steps.sign.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$IDENTITY" ] || [ -z "$APPLE_ID" ]; then
            echo "Notarization skipped (missing Developer ID cert or Apple credentials)."
            exit 0
          fi

          xcrun notarytool store-credentials "wimc-ci" \
              --keychain "$RUNNER_TEMP/app-signing.keychain-db" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD"

          APP=".build/Where is my cursor.app"
          ZIP="$RUNNER_TEMP/notarize.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"

          xcrun notarytool submit "$ZIP" \
              --keychain "$RUNNER_TEMP/app-signing.keychain-db" \
              --keychain-profile "wimc-ci" \
              --wait

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package .zip
        id: package
        run: |
          cd .build
          ditto -c -k --keepParent "Where is my cursor.app" "WhereIsMyCursor-${{ steps.version.outputs.next }}.zip"
          shasum -a 256 "WhereIsMyCursor-${{ steps.version.outputs.next }}.zip" \
              > "WhereIsMyCursor-${{ steps.version.outputs.next }}.zip.sha256"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.previous }}"
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:'- %s (%h)' --reverse)
          else
            LOG=$(git log "$PREV"..HEAD --pretty=format:'- %s (%h)' --reverse)
          fi
          SIGNED_NOTE="ad-hoc signed (right-click → Open on first launch)"
          if [ -n "${{ steps.sign.outputs.identity }}" ]; then
            SIGNED_NOTE="Developer ID signed & notarized"
          fi
          {
            echo "body<<EOF"
            echo "### Changes"
            echo ""
            echo "$LOG"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "- \`WhereIsMyCursor-${{ steps.version.outputs.next }}.zip\` — $SIGNED_NOTE"
            echo "- \`.sha256\` — checksum"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: ${{ steps.version.outputs.next }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            .build/WhereIsMyCursor-${{ steps.version.outputs.next }}.zip
            .build/WhereIsMyCursor-${{ steps.version.outputs.next }}.zip.sha256

      - name: Clean up keychain + temp files
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -Pf "$RUNNER_TEMP/build_certificate.p12" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notarize.zip" 2>/dev/null || true
